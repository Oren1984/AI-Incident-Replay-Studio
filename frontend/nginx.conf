# frontend/nginx.conf
# this is the nginx configuration file for the frontend service. 
# It is used to serve the static files and proxy API requests to the backend service. 
# For more information, see https://nginx.org/en/docs/http/ngx_http_proxy_module.html

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (Docker internal hostname)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
